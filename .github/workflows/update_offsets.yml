name: Auto Update Offsets

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run updater script
      run: python auto_update_offsets.py

    - name: Commit and push changes if updated
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add fortnite_offsets.json dayz_offsets.json
        git diff-index --quiet HEAD || git commit -m "Auto-update offsets [skip ci]"
        git push
